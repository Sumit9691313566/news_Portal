version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: news_portal
    volumes:
      - mongodb_data:/data/db
    networks:
      - news-network

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: mongodb://root:rootpassword@mongodb:27017/news_portal?authSource=admin
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      JWT_SECRET: devjwtsecretkey
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD_HASH: $2b$12$mtTRU93fGDVgjV9WuNHCWuqZROgJWJDL.BDnFzxSV.dHvc7Bbrcbi
      NEWS_RETENTION_DAYS: 180
    depends_on:
      - mongodb
    networks:
      - news-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:

networks:
  news-network:
    driver: bridge
